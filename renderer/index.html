<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>HR App — Offline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-screen" id="authScreen"></div>

  <div class="app-shell hidden" id="appShell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">HR</div>
        <div class="brand-text">
          <strong id="brandCompany">HR App</strong>
          <span>Offline</span>
        </div>
      </div>
      <nav class="nav" id="navList"></nav>
      <div class="sidebar-footer" id="sidebarFooter">
        <span>100% Offline · Data lokal</span>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <section class="view-content" id="viewContent"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modalBox"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
